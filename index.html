<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Assistant - Admin Console</title>
    <style>
        :root {
            --bg-body: #0a0e17;
            --bg-panel: #111827;
            --bg-card: #1a2332;
            --bg-card-hover: #1f2b3d;
            --bg-input: #0d1320;
            --border: #1e2d42;
            --border-active: #3b82f6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #06b6d4;
            --radius: 6px;
            --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.5;
        }
        .app { display: flex; flex-direction: column; min-height: 100vh; }
        .topbar {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 0 24px; height: 48px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-title { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; color: var(--text-primary); }
        .topbar-title span { color: var(--accent); }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .topbar-user { color: var(--text-muted); font-size: 12px; }
        .main-content { flex: 1; padding: 20px 24px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 48px); }
        .login-box { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 360px; }
        .login-box h2 { font-size: 16px; font-weight: 600; margin-bottom: 24px; text-align: center; }
        .field { margin-bottom: 16px; }
        .field label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 12px; font-weight: 500; }
        .field input, .field select, .field textarea {
            width: 100%; padding: 8px 12px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--text-primary);
            font-size: 13px; outline: none; transition: border-color 0.15s;
        }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
        .field textarea { resize: vertical; min-height: 72px; font-family: inherit; }
        .field select { cursor: pointer; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 7px 16px; border: none; border-radius: var(--radius);
            font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--bg-card); color: var(--text-primary); }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .btn-full { width: 100%; }
        .tab-bar { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab-item {
            padding: 10px 20px; cursor: pointer; font-size: 13px;
            color: var(--text-muted); border-bottom: 2px solid transparent;
            transition: all 0.15s; font-weight: 500;
        }
        .tab-item:hover { color: var(--text-secondary); }
        .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-badge {
            display: inline-block; background: var(--danger); color: #fff;
            border-radius: 8px; padding: 0 5px; font-size: 10px;
            margin-left: 6px; min-width: 16px; text-align: center; line-height: 16px;
        }
        .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
        .panel-header {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .panel-header h3 { font-size: 13px; font-weight: 600; }
        .panel-body { padding: 16px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 9px 12px; text-align: left; font-size: 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 500; background: var(--bg-card); white-space: nowrap; }
        tr:hover td { background: rgba(59,130,246,0.03); }
        .mono { font-family: var(--font-mono); font-size: 11px; color: var(--info); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; }
        .badge-active { background: rgba(34,197,94,0.12); color: var(--success); }
        .badge-expired { background: rgba(239,68,68,0.12); color: var(--danger); }
        .badge-permanent { background: rgba(59,130,246,0.12); color: var(--accent); }
        .badge-pending { background: rgba(245,158,11,0.12); color: var(--warning); }
        .badge-payment { background: rgba(6,182,212,0.12); color: var(--info); }
        .badge-manual { background: rgba(168,85,247,0.12); color: #a855f7; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
        .stat-box .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-box .stat-value { font-size: 24px; font-weight: 700; font-family: var(--font-mono); }
        .stat-box .stat-unit { font-size: 12px; color: var(--text-muted); margin-left: 4px; font-weight: 400; }
        .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; }
        .filter-btn {
            padding: 5px 14px; border-radius: var(--radius); cursor: pointer;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-secondary); font-size: 12px; transition: all 0.15s;
        }
        .filter-btn:hover { border-color: var(--text-muted); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .provider-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 20px; }
        .provider-item {
            padding: 12px; border-radius: var(--radius); cursor: pointer;
            background: var(--bg-card); border: 1px solid var(--border); text-align: center; transition: all 0.15s;
        }
        .provider-item:hover { border-color: var(--text-muted); }
        .provider-item.selected { border-color: var(--accent); background: rgba(59,130,246,0.06); }
        .provider-item .p-name { font-size: 13px; font-weight: 600; }
        .provider-item .p-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .config-bar {
            padding: 10px 16px; border-radius: var(--radius); margin-bottom: 16px;
            font-size: 12px; display: flex; align-items: center; gap: 8px;
        }
        .config-bar.ok { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: var(--success); }
        .config-bar.warn { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); color: var(--warning); }
        .config-dot { width: 6px; height: 6px; border-radius: 50%; }
        .config-dot.ok { background: var(--success); }
        .config-dot.warn { background: var(--warning); }
        .range-row { display: flex; align-items: center; gap: 12px; }
        .range-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .range-row .range-val { min-width: 40px; text-align: right; font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
        .empty { text-align: center; padding: 40px; color: var(--text-muted); }
        .loading { text-align: center; padding: 40px; color: var(--text-muted); }
        .pager {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0; font-size: 12px; color: var(--text-secondary);
        }
        .pager-btns { display: flex; gap: 6px; align-items: center; }
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--bg-panel); border: 1px solid var(--border);
            color: var(--text-primary); padding: 10px 20px;
            border-radius: var(--radius); font-size: 12px;
            opacity: 0; transition: all 0.25s; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        @media (max-width: 640px) {
            .main-content { padding: 12px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .provider-list { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <div class="topbar-title"><span>AI Assistant</span> &nbsp;Admin Console</div>
        <div class="topbar-right">
            <span class="topbar-user" id="topbarUser"></span>
            <button class="btn btn-ghost btn-sm" id="logoutBtn" style="display:none" onclick="logout()">退出</button>
        </div>
    </div>
    <div id="loginSection" class="login-wrap">
        <div class="login-box">
            <h2>管理员登录</h2>
            <div class="field">
                <label>访问密码</label>
                <input type="password" id="adminPassword" placeholder="请输入管理密码">
            </div>
            <button class="btn btn-primary btn-full" style="margin-top:20px" onclick="login()">登 录</button>
        </div>
    </div>
    <div id="mainPanel" style="display:none">
        <div class="main-content">
            <div class="tab-bar" id="tabBar"></div>
            <div id="tabContent"></div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
// ── Config ───────────────────────────────────────────────────────
const API_BASE = 'https://api.fytassistant.xyz';
const TOKEN_KEY = 'ai_admin_token';
const PAGE_SIZE = 20;

const PROVIDERS = [
    { id: 'deepseek', name: 'DeepSeek', sub: '国产·低价', url: 'https://api.deepseek.com/chat/completions', models: ['deepseek-chat', 'deepseek-reasoner'] },
    { id: 'openai', name: 'OpenAI', sub: 'GPT系列', url: 'https://api.openai.com/v1/chat/completions', models: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-3.5-turbo'] },
    { id: 'claude', name: 'Claude', sub: 'OpenRouter', url: 'https://openrouter.ai/api/v1/chat/completions', models: ['anthropic/claude-sonnet-4', 'anthropic/claude-3.5-haiku'] },
    { id: 'qwen', name: '通义千问', sub: '阿里云', url: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', models: ['qwen-turbo', 'qwen-plus', 'qwen-max'] },
    { id: 'gemini', name: 'Gemini', sub: 'Google', url: 'https://generativelanguage.googleapis.com/v1beta/openai/chat/completions', models: ['gemini-2.0-flash', 'gemini-1.5-pro'] },
    { id: 'kimi', name: 'Kimi', sub: 'Moonshot', url: 'https://api.moonshot.cn/v1/chat/completions', models: ['moonshot-v1-8k', 'moonshot-v1-32k', 'moonshot-v1-128k'] },
    { id: 'minimax', name: 'MiniMax', sub: '国产·多模态', url: 'https://api.minimax.chat/v1/text/chatcompletion_v2', models: ['MiniMax-Text-01', 'abab6.5s-chat'] },
    { id: 'zhipu', name: '智谱 GLM', sub: '清华系', url: 'https://open.bigmodel.cn/api/paas/v4/chat/completions', models: ['glm-4-flash', 'glm-4-plus', 'glm-4'] },
    { id: 'yi', name: '零一万物', sub: 'Yi系列', url: 'https://api.lingyiwanwu.com/v1/chat/completions', models: ['yi-lightning', 'yi-large', 'yi-medium'] },
    { id: 'baichuan', name: '百川', sub: 'Baichuan', url: 'https://api.baichuan-ai.com/v1/chat/completions', models: ['Baichuan4', 'Baichuan3-Turbo'] },
    { id: 'doubao', name: '豆包', sub: '字节跳动', url: 'https://ark.cn-beijing.volces.com/api/v3/chat/completions', models: ['doubao-1.5-pro-32k', 'doubao-1.5-lite-32k'] },
    { id: 'stepfun', name: '阶跃星辰', sub: 'Step系列', url: 'https://api.stepfun.com/v1/chat/completions', models: ['step-2-16k', 'step-1-8k'] },
];

const PRICING = {
    'deepseek-chat': { i: 0.27, o: 1.10 }, 'deepseek-reasoner': { i: 0.55, o: 2.19 },
    'gpt-4o': { i: 2.50, o: 10.00 }, 'gpt-4o-mini': { i: 0.15, o: 0.60 },
    'gpt-4-turbo': { i: 10.00, o: 30.00 }, 'gpt-3.5-turbo': { i: 0.50, o: 1.50 },
    'anthropic/claude-sonnet-4': { i: 3.00, o: 15.00 }, 'anthropic/claude-3.5-haiku': { i: 0.80, o: 4.00 },
    'qwen-turbo': { i: 0.30, o: 0.60 }, 'qwen-plus': { i: 0.80, o: 2.00 }, 'qwen-max': { i: 2.40, o: 9.60 },
    'gemini-2.0-flash': { i: 0.10, o: 0.40 }, 'gemini-1.5-pro': { i: 1.25, o: 5.00 },
    'moonshot-v1-8k': { i: 0.17, o: 0.17 }, 'moonshot-v1-32k': { i: 0.34, o: 0.34 }, 'moonshot-v1-128k': { i: 0.86, o: 0.86 },
    'MiniMax-Text-01': { i: 0.14, o: 0.14 }, 'abab6.5s-chat': { i: 0.14, o: 0.14 },
    'glm-4-flash': { i: 0.01, o: 0.01 }, 'glm-4-plus': { i: 0.70, o: 0.70 }, 'glm-4': { i: 1.40, o: 1.40 },
    'yi-lightning': { i: 0.14, o: 0.14 }, 'yi-large': { i: 2.80, o: 2.80 }, 'yi-medium': { i: 0.35, o: 0.35 },
    'Baichuan4': { i: 1.40, o: 1.40 }, 'Baichuan3-Turbo': { i: 0.17, o: 0.17 },
    'doubao-1.5-pro-32k': { i: 0.11, o: 0.11 }, 'doubao-1.5-lite-32k': { i: 0.04, o: 0.04 },
    'step-2-16k': { i: 0.55, o: 1.97 }, 'step-1-8k': { i: 0.17, o: 0.55 },
};

// ── State ────────────────────────────────────────────────────────
let token = '';
let currentTab = 'devices';
let usageDays = 30;
let selectedProvider = null;
let cachedConfig = null;
let devicesPage = 1;
let devicesSearch = '';
let usageDevicePage = 1;
let usageFilterModel = '';
let requestsPage = 1;

// ── Auth ─────────────────────────────────────────────────────────
async function login() {
    const pwd = document.getElementById('adminPassword').value.trim();
    if (!pwd) return;
    token = pwd;
    try {
        const res = await apiFetch('/admin/devices');
        if (res.ok) { localStorage.setItem(TOKEN_KEY, pwd); showMain(); }
        else { showToast('密码错误', 'error'); }
    } catch (e) { showToast('网络错误', 'error'); }
}

function logout() {
    localStorage.removeItem(TOKEN_KEY);
    token = '';
    document.getElementById('loginSection').style.display = 'flex';
    document.getElementById('mainPanel').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'none';
    document.getElementById('topbarUser').textContent = '';
}

function showMain() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'inline-flex';
    document.getElementById('topbarUser').textContent = 'Admin';
    renderTabs();
    switchTab('devices');
}

function checkLogin() {
    const saved = localStorage.getItem(TOKEN_KEY);
    if (saved) { token = saved; showMain(); }
}

// ── API ──────────────────────────────────────────────────────────
function apiFetch(path, opts = {}) {
    const headers = { 'Authorization': 'Bearer ' + token, ...opts.headers };
    if (opts.body && typeof opts.body === 'object') {
        headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(opts.body);
    }
    return fetch(API_BASE + path, { ...opts, headers });
}
async function apiJson(path, opts = {}) { return (await apiFetch(path, opts)).json(); }

// ── Tabs ─────────────────────────────────────────────────────────
const TABS = [
    { id: 'devices', label: '设备管理' },
    { id: 'usage', label: '用量统计' },
    { id: 'aiconfig', label: 'AI 配置' },
    { id: 'requests', label: '激活申请' },
];

function renderTabs() {
    document.getElementById('tabBar').innerHTML = TABS.map(t =>
        `<div class="tab-item ${t.id === currentTab ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}${t.id === 'requests' ? '<span class="tab-badge" id="reqBadge" style="display:none">0</span>' : ''}</div>`
    ).join('');
}

function switchTab(id) {
    currentTab = id;
    renderTabs();
    if (id === 'devices') { devicesPage = 1; devicesSearch = ''; loadDevices(); }
    else if (id === 'usage') { usageDevicePage = 1; usageFilterModel = ''; loadUsage(); }
    else if (id === 'aiconfig') loadAiConfig();
    else if (id === 'requests') { requestsPage = 1; loadRequests(); }
}

// ── Pagination helper ────────────────────────────────────────────
function renderPagination(total, page, pageSize, onPageChangeFn) {
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (totalPages <= 1) return '';
    const prevDis = page <= 1 ? ' disabled style="opacity:0.4;pointer-events:none"' : '';
    const nextDis = page >= totalPages ? ' disabled style="opacity:0.4;pointer-events:none"' : '';
    return '<div class="pager">' +
        '<span>共 ' + total + ' 条 / ' + totalPages + ' 页</span>' +
        '<div class="pager-btns">' +
        '<button class="btn btn-ghost btn-sm"' + prevDis + ' onclick="' + onPageChangeFn + '(' + (page - 1) + ')">上一页</button>' +
        '<span style="min-width:60px;text-align:center">' + page + ' / ' + totalPages + '</span>' +
        '<button class="btn btn-ghost btn-sm"' + nextDis + ' onclick="' + onPageChangeFn + '(' + (page + 1) + ')">下一页</button>' +
        '</div></div>';
}

function fmtNum(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
}
</script>
<script>
// ── Devices ──────────────────────────────────────────────────────
function gotoDevicesPage(p) { devicesPage = p; loadDevices(); }

function searchDevices() {
    devicesSearch = (document.getElementById('deviceSearchInput') || {}).value || '';
    devicesSearch = devicesSearch.trim();
    devicesPage = 1;
    loadDevices();
}

function clearDeviceSearch() {
    devicesSearch = '';
    devicesPage = 1;
    loadDevices();
}

function buildDeviceRow(d) {
    var isPerm = d.is_permanent;
    var isExp = d.is_expired;
    var statusText = isPerm ? '永久' : (isExp ? '已过期' : '有效');
    var statusCls = isPerm ? 'badge-permanent' : (isExp ? 'badge-expired' : 'badge-active');
    var isPay = d.order_id && d.order_id !== 'admin_approved';
    var methodText = isPay ? '付费激活' : '手动激活';
    var methodCls = isPay ? 'badge-payment' : 'badge-manual';
    var at = d.activated_at ? new Date(d.activated_at).toLocaleString('zh-CN') : '-';
    var exp = isPerm ? '<span class="badge badge-permanent">永久</span>' : (d.expires_at ? new Date(d.expires_at).toLocaleString('zh-CN') : '-');
    var delBtn = isPay
        ? '<span style="color:var(--text-muted);font-size:11px">付费用户</span>'
        : '<button class="btn btn-danger btn-sm" onclick="delDevice(\'' + d.device_code + '\')">删除</button>';
    return '<tr>' +
        '<td class="mono">' + d.device_code + '</td>' +
        '<td><span class="badge ' + statusCls + '">' + statusText + '</span></td>' +
        '<td><span class="badge ' + methodCls + '">' + methodText + '</span></td>' +
        '<td>' + at + '</td><td>' + exp + '</td>' +
        '<td>' + delBtn + '</td></tr>';
}

async function loadDevices() {
    var el = document.getElementById('tabContent');
    el.innerHTML = '<div class="loading">加载中...</div>';
    var params = '?page=' + devicesPage + '&page_size=' + PAGE_SIZE;
    if (devicesSearch) params += '&search=' + encodeURIComponent(devicesSearch);
    var data;
    try {
        data = await apiJson('/admin/devices' + params);
    } catch (e) {
        el.innerHTML = '<div class="panel"><div class="panel-body"><div class="empty">网络错误</div></div></div>';
        return;
    }
    if (!data || !data.success) {
        el.innerHTML = '<div class="panel"><div class="panel-body"><div class="empty">加载失败</div></div></div>';
        return;
    }
    var total = data.total || 0;
    var devices = data.devices || [];
    var rows = devices.map(buildDeviceRow).join('');

    var searchVal = devicesSearch ? ' value="' + devicesSearch + '"' : '';
    var clearBtn = devicesSearch ? ' <button class="btn btn-ghost btn-sm" onclick="clearDeviceSearch()">清除</button>' : '';
    var searchBar = '<div style="display:flex;gap:8px;margin-bottom:12px">' +
        '<input type="text" id="deviceSearchInput" placeholder="按设备码搜索..."' + searchVal +
        ' style="flex:1;padding:7px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:12px;outline:none"' +
        ' onkeypress="if(event.key===\'Enter\')searchDevices()">' +
        '<button class="btn btn-ghost btn-sm" onclick="searchDevices()">搜索</button>' + clearBtn + '</div>';

    var pagerHtml = renderPagination(total, devicesPage, PAGE_SIZE, 'gotoDevicesPage');
    var tableHtml = devices.length
        ? '<div class="table-wrap"><table>' +
          '<thead><tr><th>设备码</th><th>状态</th><th>激活方式</th><th>激活时间</th><th>到期时间</th><th>操作</th></tr></thead>' +
          '<tbody>' + rows + '</tbody></table></div>' + pagerHtml
        : '<div class="empty">暂无匹配设备</div>';

    el.innerHTML = '<div class="panel">' +
        '<div class="panel-header"><h3>已激活设备 (' + total + ')</h3>' +
        '<button class="btn btn-ghost btn-sm" onclick="loadDevices()">刷新</button></div>' +
        '<div class="panel-body">' + searchBar + tableHtml + '</div></div>';
}

async function delDevice(code) {
    if (!confirm('确定删除该设备？')) return;
    var d = await apiJson('/admin/devices', { method: 'DELETE', body: { device_code: code } });
    d.success ? (showToast('已删除', 'success'), loadDevices()) : showToast(d.error || '失败', 'error');
}
</script>
<script>
// ── Usage ────────────────────────────────────────────────────────
function gotoUsageDevicePage(p) { usageDevicePage = p; loadUsage(); }

function filterByModel(model) {
    usageFilterModel = (usageFilterModel === model) ? '' : model;
    usageDevicePage = 1;
    loadUsage();
}

function calcModelCost(m) {
    var p = PRICING[m.model] || { i: 0, o: 0 };
    return (m.prompt_tokens / 1e6) * p.i + (m.completion_tokens / 1e6) * p.o;
}

function buildModelRow(m) {
    var cost = calcModelCost(m);
    return '<tr>' +
        '<td style="font-weight:500">' + m.model + '</td>' +
        '<td>' + fmtNum(m.prompt_tokens) + '</td>' +
        '<td>' + fmtNum(m.completion_tokens) + '</td>' +
        '<td>' + fmtNum(m.total_tokens) + '</td>' +
        '<td>' + m.request_count + '</td>' +
        '<td style="font-family:var(--font-mono)">' + cost.toFixed(4) + '</td></tr>';
}

function buildUsageDeviceRow(d) {
    var p = PRICING[d.model] || PRICING['deepseek-chat'] || { i: 0, o: 0 };
    var dc = (d.prompt_tokens / 1e6) * p.i + (d.completion_tokens / 1e6) * p.o;
    return '<tr><td class="mono">' + d.device_code + '</td>' +
        '<td>' + fmtNum(d.prompt_tokens) + '</td>' +
        '<td>' + fmtNum(d.completion_tokens) + '</td>' +
        '<td>' + fmtNum(d.total_tokens) + '</td>' +
        '<td>' + d.request_count + '</td>' +
        '<td style="font-family:var(--font-mono)">' + dc.toFixed(4) + '</td></tr>';
}

function buildModelFilterBar(perModel) {
    if (!perModel || !perModel.length) return '';
    var allCls = !usageFilterModel ? 'filter-btn active' : 'filter-btn';
    var btns = '<div class="' + allCls + '" onclick="filterByModel(\'\')">全部模型</div>';
    perModel.forEach(function(m) {
        var cls = usageFilterModel === m.model ? 'filter-btn active' : 'filter-btn';
        btns += '<div class="' + cls + '" onclick="filterByModel(\'' + m.model + '\')">' + m.model +
            ' <span style="opacity:0.6;font-size:10px">(' + fmtNum(m.total_tokens) + ')</span></div>';
    });
    return '<div class="filter-bar" style="flex-wrap:wrap;margin-bottom:12px">' + btns + '</div>';
}

async function loadUsage() {
    var el = document.getElementById('tabContent');
    el.innerHTML = '<div class="loading">加载中...</div>';
    var data;
    try {
        data = await apiJson('/admin/usage-stats?days=' + usageDays + '&page=' + usageDevicePage + '&page_size=' + PAGE_SIZE + (usageFilterModel ? '&model=' + encodeURIComponent(usageFilterModel) : ''));
    } catch (e) {
        el.innerHTML = '<div class="panel"><div class="panel-body"><div class="empty">网络错误，请检查 Worker 是否已部署</div></div></div>';
        return;
    }
    if (!data || !data.success) {
        el.innerHTML = '<div class="panel"><div class="panel-body"><div class="empty">加载失败: ' + (data && data.error ? data.error : '服务端错误，请检查 D1 数据库迁移') + '</div></div></div>';
        return;
    }

    var t = data.totals || {};
    var perModel = data.per_model || [];
    var perDevice = data.per_device || [];
    var perDeviceTotal = data.per_device_total || 0;

    // Calculate total cost from per-model data (accurate)
    var totalCost = 0;
    perModel.forEach(function(m) { totalCost += calcModelCost(m); });

    // Filter buttons
    var filterHtml = [3, 7, 15, 30].map(function(d) {
        var cls = d === usageDays ? 'filter-btn active' : 'filter-btn';
        return '<div class="' + cls + '" onclick="usageDays=' + d + ';usageDevicePage=1;usageFilterModel=\'\';loadUsage()">' + d + ' 天</div>';
    }).join('');

    // Model rows
    var modelRows = perModel.map(buildModelRow).join('');
    var modelPanel = perModel.length
        ? '<div class="panel"><div class="panel-header"><h3>模型用量明细</h3>' +
          '<span style="color:var(--text-muted);font-size:11px">按各模型实际定价换算</span></div>' +
          '<div class="panel-body"><div class="table-wrap"><table>' +
          '<thead><tr><th>模型</th><th>输入 Tokens</th><th>输出 Tokens</th><th>总 Tokens</th><th>请求数</th><th>费用 (USD)</th></tr></thead>' +
          '<tbody>' + modelRows + '</tbody></table></div></div></div>'
        : '';

    // Device rows + pagination
    var deviceRows = perDevice.map(buildUsageDeviceRow).join('');
    var devicePager = renderPagination(perDeviceTotal, usageDevicePage, PAGE_SIZE, 'gotoUsageDevicePage');
    var deviceContent = perDevice.length
        ? '<div class="table-wrap"><table>' +
          '<thead><tr><th>设备码</th><th>输入 Tokens</th><th>输出 Tokens</th><th>总 Tokens</th><th>请求数</th><th>费用</th></tr></thead>' +
          '<tbody>' + deviceRows + '</tbody></table></div>' + devicePager
        : '<div class="empty">暂无用量数据</div>';

    el.innerHTML = '<div class="filter-bar">' + filterHtml + '</div>' +
        '<div class="stats-grid">' +
        '<div class="stat-box"><div class="stat-label">活跃设备</div><div class="stat-value">' + (t.device_count || 0) + '</div></div>' +
        '<div class="stat-box"><div class="stat-label">总 Tokens</div><div class="stat-value">' + fmtNum(t.total_tokens || 0) + '</div></div>' +
        '<div class="stat-box"><div class="stat-label">请求次数</div><div class="stat-value">' + (t.request_count || 0) + '</div></div>' +
        '<div class="stat-box"><div class="stat-label">预估总费用</div><div class="stat-value">' + totalCost.toFixed(4) + '<span class="stat-unit">USD</span></div></div>' +
        '</div>' + modelPanel +
        buildModelFilterBar(perModel) +
        '<div class="panel"><div class="panel-header"><h3>设备用量明细' + (usageFilterModel ? ' — ' + usageFilterModel : '') + '</h3>' +
        '<span style="color:var(--text-muted);font-size:11px">共 ' + perDeviceTotal + ' 台设备</span></div>' +
        '<div class="panel-body">' + deviceContent + '</div></div>';
}
</script>
<script>
// ── AI Config ────────────────────────────────────────────────────
var configStats = null;

async function loadAiConfig() {
    var el = document.getElementById('tabContent');
    el.innerHTML = '<div class="loading">加载中...</div>';
    var data = await apiJson('/admin/ai-config');
    cachedConfig = data.config;
    configStats = data.stats;
    var cfg = data.config;
    var hasConfig = cfg && cfg.api_key;
    var savedProviderId = cfg ? cfg.provider : null;

    var currentP = PROVIDERS.find(function(p) { return p.id === savedProviderId; }) || PROVIDERS[0];
    selectedProvider = currentP.id;

    var statusHtml = hasConfig
        ? '<div class="config-bar ok"><div class="config-dot ok"></div>当前使用: ' + currentP.name + ' / ' + cfg.model + ' — 更新于 ' + new Date(cfg.updated_at).toLocaleString('zh-CN') + '</div>'
        : '<div class="config-bar warn"><div class="config-dot warn"></div>尚未配置 AI 服务商，请选择并保存</div>';

    var providerHtml = PROVIDERS.map(function(p) {
        var isCurrent = savedProviderId === p.id;
        var currentTag = isCurrent ? '<div style="font-size:10px;color:var(--success);margin-top:2px">当前使用</div>' : '';
        return '<div class="provider-item ' + (isCurrent ? 'selected' : '') + '" onclick="pickProvider(\'' + p.id + '\')" id="pi-' + p.id + '">' +
            '<div class="p-name">' + p.name + '</div><div class="p-sub">' + p.sub + '</div>' + currentTag + '</div>';
    }).join('');

    var modelOpts = currentP.models.map(function(m) {
        return '<option value="' + m + '"' + (cfg && cfg.model === m ? ' selected' : '') + '>' + m + '</option>';
    }).join('');

    var temp = (cfg && cfg.temperature != null) ? cfg.temperature : 0.7;
    var maxTk = (cfg && cfg.max_tokens != null) ? cfg.max_tokens : 1024;
    var keyLabel = hasConfig ? 'API Key <span style="color:var(--success);font-size:11px">（已配置）</span>' : 'API Key';
    var keyPlaceholder = hasConfig ? '已配置 — 留空则保持不变' : '输入 API Key';

    var s = configStats || {};
    var statsHtml = '<div class="stats-grid" style="margin-bottom:16px">' +
        '<div class="stat-box"><div class="stat-label">激活设备</div><div class="stat-value">' + (s.active_devices || 0) + '</div></div>' +
        '<div class="stat-box"><div class="stat-label">今日活跃</div><div class="stat-value">' + (s.today_active || 0) + '</div></div>' +
        '<div class="stat-box"><div class="stat-label">今日 Tokens</div><div class="stat-value">' + fmtNum(s.today_tokens || 0) + '</div></div>' +
        '<div class="stat-box"><div class="stat-label">今日请求</div><div class="stat-value">' + (s.today_requests || 0) + '</div></div></div>';

    var cfgUrl = (cfg && cfg.api_url) ? cfg.api_url : currentP.url;
    var sysPrompt = (cfg && cfg.system_prompt) ? cfg.system_prompt : '';

    el.innerHTML = statusHtml + statsHtml +
        '<div class="panel"><div class="panel-header"><h3>服务商选择</h3></div><div class="panel-body">' +
        '<div class="provider-list">' + providerHtml + '</div>' +
        '<div class="field"><label id="lblKey">' + keyLabel + '</label><input type="password" id="cfgKey" value="" placeholder="' + keyPlaceholder + '"></div>' +
        '<div class="field"><label>模型</label><select id="cfgModel">' + modelOpts + '</select></div>' +
        '<div class="field"><label>API URL</label><input type="text" id="cfgUrl" value="' + cfgUrl + '" placeholder="API 端点地址"></div>' +
        '<div class="field"><label>Max Tokens: <span id="mtkVal">' + maxTk + '</span></label>' +
        '<div class="range-row"><input type="range" id="cfgMtk" min="256" max="4096" step="256" value="' + maxTk + '" oninput="document.getElementById(\'mtkVal\').textContent=this.value"></div></div>' +
        '<div class="field"><label>Temperature: <span id="tmpVal">' + temp + '</span></label>' +
        '<div class="range-row"><input type="range" id="cfgTmp" min="0" max="2" step="0.1" value="' + temp + '" oninput="document.getElementById(\'tmpVal\').textContent=this.value"></div></div>' +
        '<div class="field"><label>System Prompt（可选）</label><textarea id="cfgPrompt" placeholder="自定义系统提示词...">' + sysPrompt + '</textarea></div>' +
        '<div style="display:flex;gap:8px">' +
        '<button class="btn btn-ghost" style="flex:1" onclick="testAiConfig()" id="btnTest">测试 API Key</button>' +
        '<button class="btn btn-primary" style="flex:1" onclick="saveAiConfig()">保存配置</button></div>' +
        '<div id="testResult" style="margin-top:12px"></div></div></div>';
}

function pickProvider(id) {
    selectedProvider = id;
    document.querySelectorAll('.provider-item').forEach(function(e) { e.classList.remove('selected'); });
    document.getElementById('pi-' + id).classList.add('selected');
    var p = PROVIDERS.find(function(x) { return x.id === id; });
    if (!p) return;
    document.getElementById('cfgModel').innerHTML = p.models.map(function(m) {
        return '<option value="' + m + '">' + m + '</option>';
    }).join('');
    document.getElementById('cfgUrl').value = p.url;

    var savedId = cachedConfig ? cachedConfig.provider : null;
    var hasKey = cachedConfig && cachedConfig.api_key;
    var keyEl = document.getElementById('cfgKey');
    var lblEl = document.getElementById('lblKey');
    keyEl.value = '';

    if (id === savedId && hasKey) {
        keyEl.placeholder = '已配置 — 留空则保持不变';
        lblEl.innerHTML = 'API Key <span style="color:var(--success);font-size:11px">（已配置）</span>';
    } else {
        keyEl.placeholder = '输入 API Key';
        lblEl.textContent = 'API Key';
    }
}

async function testAiConfig() {
    var btn = document.getElementById('btnTest');
    var resultEl = document.getElementById('testResult');
    var apiKey = document.getElementById('cfgKey').value.trim();
    var apiUrl = document.getElementById('cfgUrl').value.trim();
    var model = document.getElementById('cfgModel').value;
    var savedId = cachedConfig ? cachedConfig.provider : null;
    var isSameProvider = selectedProvider === savedId;
    var keyToTest = apiKey || (isSameProvider && cachedConfig ? cachedConfig.api_key : '');
    var urlToTest = apiUrl || (cachedConfig ? cachedConfig.api_url : '');

    if (!keyToTest) { showToast('请输入 API Key', 'error'); return; }
    if (!urlToTest) { showToast('请输入 API URL', 'error'); return; }

    btn.textContent = '测试中...';
    btn.disabled = true;
    resultEl.innerHTML = '';

    try {
        var d = await apiJson('/admin/test-ai-config', {
            method: 'POST',
            body: { api_url: urlToTest, api_key: keyToTest, model: model }
        });
        if (d.success) {
            resultEl.innerHTML = '<div class="config-bar ok"><div class="config-dot ok"></div>' +
                '测试通过 — 模型: ' + d.model + ' — 延迟: ' + d.latency_ms + 'ms — 回复: "' + d.reply + '"</div>';
        } else {
            resultEl.innerHTML = '<div class="config-bar warn"><div class="config-dot warn"></div>' +
                '测试失败 — ' + (d.error || '未知错误') + ' — 延迟: ' + d.latency_ms + 'ms</div>';
        }
    } catch (e) {
        resultEl.innerHTML = '<div class="config-bar warn"><div class="config-dot warn"></div>网络错误</div>';
    }
    btn.textContent = '测试 API Key';
    btn.disabled = false;
}

async function saveAiConfig() {
    var apiKey = document.getElementById('cfgKey').value.trim();
    var apiUrl = document.getElementById('cfgUrl').value.trim();
    var savedId = cachedConfig ? cachedConfig.provider : null;
    var isSameProvider = selectedProvider === savedId;
    var keyToSave = apiKey || (isSameProvider && cachedConfig ? (cachedConfig.api_key || '') : '');

    if (!keyToSave) { showToast('请输入 API Key', 'error'); return; }
    if (!apiUrl) { showToast('请输入 API URL', 'error'); return; }

    var body = {
        provider: selectedProvider,
        model: document.getElementById('cfgModel').value,
        api_key: keyToSave,
        api_url: apiUrl,
        max_tokens: parseInt(document.getElementById('cfgMtk').value),
        temperature: parseFloat(document.getElementById('cfgTmp').value),
        system_prompt: document.getElementById('cfgPrompt').value.trim(),
    };
    var d = await apiJson('/admin/ai-config', { method: 'POST', body: body });
    d.ok ? (showToast('配置已保存，设备下次启动生效', 'success'), loadAiConfig()) : showToast(d.error || '保存失败', 'error');
}
</script>
<script>
// ── Requests ─────────────────────────────────────────────────────
function gotoRequestsPage(p) { requestsPage = p; loadRequests(); }

function buildRequestRow(r) {
    var time = r.created_at ? new Date(r.created_at).toLocaleString('zh-CN') : '-';
    var sBadge = '', actions = '';
    if (r.status === 'pending') {
        sBadge = '<span class="badge badge-pending">待处理</span>';
        actions = '<button class="btn btn-primary btn-sm" onclick="approveReq(\'' + r.device_code + '\')">批准</button> ' +
                  '<button class="btn btn-danger btn-sm" onclick="rejectReq(\'' + r.device_code + '\')">拒绝</button>';
    } else if (r.status === 'approved') {
        sBadge = '<span class="badge badge-active">已批准</span>';
        actions = r.processed_at ? '<span style="color:var(--text-muted);font-size:11px">' + new Date(r.processed_at).toLocaleString('zh-CN') + '</span>' : '';
    } else {
        sBadge = '<span class="badge badge-expired">已拒绝</span>';
        actions = r.processed_at ? '<span style="color:var(--text-muted);font-size:11px">' + new Date(r.processed_at).toLocaleString('zh-CN') + '</span>' : '';
    }
    return '<tr><td class="mono">' + r.device_code + '</td><td>' + (r.reason || '-') + '</td><td>' + time + '</td><td>' + sBadge + '</td><td>' + actions + '</td></tr>';
}

async function loadRequests() {
    var el = document.getElementById('tabContent');
    el.innerHTML = '<div class="loading">加载中...</div>';
    var data;
    try {
        data = await apiJson('/admin/requests?page=' + requestsPage + '&page_size=' + PAGE_SIZE);
    } catch (e) {
        el.innerHTML = '<div class="panel"><div class="panel-body"><div class="empty">网络错误</div></div></div>';
        updBadge(0);
        return;
    }
    if (!data || !data.success) {
        el.innerHTML = '<div class="panel"><div class="panel-body"><div class="empty">加载失败</div></div></div>';
        updBadge(0);
        return;
    }

    var requests = data.requests || [];
    var total = data.total || 0;

    if (!requests.length && requestsPage <= 1) {
        el.innerHTML = '<div class="panel"><div class="panel-body"><div class="empty">暂无激活申请</div></div></div>';
        updBadge(0);
        return;
    }

    var pending = requests.filter(function(r) { return r.status === 'pending'; }).length;
    updBadge(pending);

    var rows = requests.map(buildRequestRow).join('');
    var pagerHtml = renderPagination(total, requestsPage, PAGE_SIZE, 'gotoRequestsPage');

    el.innerHTML = '<div class="panel">' +
        '<div class="panel-header"><h3>激活申请 (' + total + ')</h3>' +
        '<button class="btn btn-ghost btn-sm" onclick="loadRequests()">刷新</button></div>' +
        '<div class="panel-body"><div class="table-wrap"><table>' +
        '<thead><tr><th>设备码</th><th>备注</th><th>申请时间</th><th>状态</th><th>操作</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table></div>' + pagerHtml + '</div></div>';
}

function updBadge(n) {
    var b = document.getElementById('reqBadge');
    if (!b) return;
    if (n > 0) { b.textContent = n; b.style.display = 'inline-block'; }
    else b.style.display = 'none';
}

async function approveReq(code) {
    var days = prompt('输入激活天数（0 = 永久）:', '0');
    if (days === null) return;
    var n = parseInt(days);
    if (isNaN(n) || n < 0) { showToast('请输入有效天数', 'error'); return; }
    var d = await apiJson('/admin/requests/approve', { method: 'POST', body: { device_code: code, days: n } });
    d.success ? (showToast('已批准', 'success'), loadRequests()) : showToast(d.error || '失败', 'error');
}

async function rejectReq(code) {
    if (!confirm('确定拒绝？')) return;
    var d = await apiJson('/admin/requests/reject', { method: 'POST', body: { device_code: code } });
    d.success ? (showToast('已拒绝', 'success'), loadRequests()) : showToast(d.error || '失败', 'error');
}

// ── Toast ────────────────────────────────────────────────────────
function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ── Init ─────────────────────────────────────────────────────────
document.getElementById('adminPassword').addEventListener('keypress', function(e) { if (e.key === 'Enter') login(); });
checkLogin();
</script>
